{% extends 'base.html' %}

{% block title %}Password Changed - EduResults CM{% endblock %}
{% block nav_profile %}active{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card shadow border-0">
                <div class="card-body py-5">
                    <i class="ti ti-circle-check text-success" style="font-size:4rem;"></i>
                    <h4 class="mt-3 fw-bold">Password Changed Successfully</h4>
                    <p class="text-muted">Your password has been updated. Use your new password next time you log in.</p>
                    <a href="{% url 'accounts:dashboard' %}" class="btn btn-primary mt-2">
                        <i class="ti ti-home"></i> Back to Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
