{% extends 'base.html' %}

{% block title %}Password reset complete - EduResults CM{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0">Password Reset Complete</h4>
                </div>
                <div class="card-body text-center">
                    <p class="lead">Your password has been set. You may go ahead and log in now.</p>
                    <a href="{% url 'accounts:login' %}" class="btn btn-primary mt-3">Log in</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
